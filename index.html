<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatSense AI-DVR | Command Center</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-dark: #0b1120;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --neon-green: #10b981;
            --neon-yellow: #eab308;
            --neon-red: #ef4444;
            --neon-cyan: #06b6d4;
            --muted: #64748b;
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.3);
            margin-bottom: 15px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
        }

        .title-block p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .btn-run {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-run:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 2.5fr 1fr;
            grid-template-rows: 2fr 1fr;
            gap: 15px;
            flex: 1;
        }

        /* MAIN CAMERA (WEBCAM) */
        .main-cam {
            grid-column: 1 / 2;
            grid-row: 1 / 3;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* SIMULATED SECONDARY CAMERAS */
        .sub-cams {
            display: flex;
            flex-direction: column;
            gap: 15px;
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        .cam-box {
            flex: 1;
            background: #050505;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Static effect for fake cameras */
        .static-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);
            z-index: 1;
            pointer-events: none;
        }

        .cam-label {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.8);
            color: var(--neon-cyan);
            font-size: 0.7rem;
            padding: 3px 8px;
            z-index: 5;
            border-left: 2px solid var(--neon-cyan);
        }

        /* AI Overlays */
        .ai-box {
            position: absolute;
            border: 2px solid transparent;
            z-index: 4;
            transition: all 0.5s;
            opacity: 0;
            display: flex;
            flex-direction: column;
        }

        .ai-label {
            position: absolute;
            top: -20px;
            left: -2px;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #000;
            white-space: nowrap;
        }

        /* AI EVENT LOG */
        .log-panel {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .log-title {
            color: var(--neon-cyan);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.3);
            padding-bottom: 5px;
        }

        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
            font-size: 0.75rem;
        }

        .log-list li {
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 2px solid transparent;
        }

        .log-ignored { color: var(--muted); border-left-color: var(--muted) !important; text-decoration: line-through; }
        .log-tracking { color: var(--neon-yellow); border-left-color: var(--neon-yellow) !important; }
        .log-alert { color: var(--neon-red); border-left-color: var(--neon-red) !important; font-weight: bold; }

        /* Full Screen Alert Overlay */
        .global-alert {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(239, 68, 68, 0.15);
            box-shadow: inset 0 0 100px rgba(239, 68, 68, 0.8);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .alert-banner {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-red);
            color: #fff;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(239, 68, 68, 1);
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-block">
            <h1>ThreatSense AI-DVR</h1>
            <p>Active Node: Edge Processing | Filter Level: Maximum</p>
        </div>
        <div>
            <button class="btn-run" onclick="runPitchDemo()">Initialize Network Demo</button>
        </div>
    </header>

    <div class="grid-container">
        <div class="main-cam">
            <video id="webcam" autoplay playsinline muted></video>
            <div class="cam-label">CH 01: MAIN ENTRANCE (LIVE)</div>
            
            <div id="main-target" class="ai-box" style="width: 30%; height: 60%; left: 35%; top: 20%;">
                <div id="main-label" class="ai-label"></div>
            </div>
        </div>

        <div class="sub-cams">
            <div class="cam-box">
                <div class="static-overlay"></div>
                <div class="cam-label">CH 02: PERIMETER ALLEY</div>
                <div id="shadow-target" class="ai-box" style="width: 40%; height: 50%; left: 10%; top: 40%; border-style: dashed;">
                    <div id="shadow-label" class="ai-label" style="background: var(--muted); color: #fff;"></div>
                </div>
            </div>
            
            <div class="cam-box">
                <div class="static-overlay"></div>
                <div class="cam-label">CH 03: LOADING DOCK</div>
                <div id="dog-target" class="ai-box" style="width: 25%; height: 25%; right: 20%; bottom: 10%; border-style: dashed;">
                    <div id="dog-label" class="ai-label" style="background: var(--muted); color: #fff;"></div>
                </div>
            </div>
        </div>

        <div class="log-panel">
            <div class="log-title">AI Processing Pipeline</div>
            <ul class="log-list" id="event-log">
                <li style="color: var(--neon-cyan); border-left-color: var(--neon-cyan);">System Online. Monitoring all channels.</li>
            </ul>
        </div>
    </div>

    <div id="global-alert" class="global-alert">
        <div class="alert-banner">
            HIGH RISK BEHAVIOR DETECTED<br>
            <span style="font-size: 1rem; font-weight: normal;">CH 01: Unauthorized access attempt. Security dispatched.</span>
        </div>
    </div>

    <script>
        // Init Webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => document.getElementById('webcam').srcObject = stream)
            .catch(err => alert("Please allow camera access for the demo."));

        const logList = document.getElementById('event-log');
        const mainTarget = document.getElementById('main-target');
        const mainLabel = document.getElementById('main-label');
        const shadowTarget = document.getElementById('shadow-target');
        const shadowLabel = document.getElementById('shadow-label');
        const dogTarget = document.getElementById('dog-target');
        const dogLabel = document.getElementById('dog-label');
        const alertOverlay = document.getElementById('global-alert');

        function addLog(text, className) {
            const li = document.createElement('li');
            const time = new Date().toTimeString().split(' ')[0];
            li.innerHTML = `[${time}] ${text}`;
            li.className = className;
            logList.prepend(li);
        }

        function runPitchDemo() {
            logList.innerHTML = '<li style="color: var(--neon-cyan); border-left-color: var(--neon-cyan);">Simulation Started. Running Edge AI Filters.</li>';
            mainTarget.style.opacity = '0';
            shadowTarget.style.opacity = '0';
            dogTarget.style.opacity = '0';
            alertOverlay.style.opacity = '0';

            // Phase 1: Filter Shadow (T=2s)
            setTimeout(() => {
                shadowTarget.style.opacity = '1';
                shadowTarget.style.borderColor = 'var(--muted)';
                shadowLabel.innerText = "Motion: Shadow";
                addLog("CH 02: Pixel shift detected. Class: Shadow -> Filtered. No Alert.", "log-ignored");
                
                setTimeout(() => shadowTarget.style.opacity = '0', 3000);
            }, 2000);

            // Phase 2: Filter Animal (T=6s)
            setTimeout(() => {
                dogTarget.style.opacity = '1';
                dogTarget.style.borderColor = 'var(--muted)';
                dogLabel.innerText = "Object: Canine";
                addLog("CH 03: Motion detected. Class: Animal -> Filtered. No Alert.", "log-ignored");
                
                setTimeout(() => dogTarget.style.opacity = '0', 3000);
            }, 6000);

            // Phase 3: Human Detection on Main (T=10s)
            // PRESENTATION NOTE: Stand still looking at camera here
            setTimeout(() => {
                mainTarget.style.opacity = '1';
                mainTarget.style.borderColor = 'var(--neon-yellow)';
                mainTarget.style.background = 'rgba(234, 179, 8, 0.1)';
                mainLabel.innerText = "Class: Human [Tracking Intent]";
                mainLabel.style.background = 'var(--neon-yellow)';
                addLog("CH 01: Human detected. Initiating pose estimation...", "log-tracking");
            }, 10000);

            // Phase 4: High Risk Escelation (T=14s)
            // PRESENTATION NOTE: Do something suspicious here (cover face, reach for pocket)
            setTimeout(() => {
                mainTarget.style.borderColor = 'var(--neon-red)';
                mainTarget.style.background = 'rgba(239, 68, 68, 0.2)';
                mainLabel.innerText = "Class: Human [HIGH RISK]";
                mainLabel.style.background = 'var(--neon-red)';
                mainLabel.style.color = '#fff';
                
                alertOverlay.style.opacity = '1';
                addLog("CH 01: High-risk behavioral sequence detected. THREAT ALERT FIRED.", "log-alert");
                
                let flash = setInterval(() => {
                    alertOverlay.style.opacity = alertOverlay.style.opacity === '1' ? '0.4' : '1';
                }, 400);

                setTimeout(() => {
                    clearInterval(flash);
                    alertOverlay.style.opacity = '0';
                    mainTarget.style.opacity = '0';
                }, 6000);
            }, 14000);
        }
    </script>
</body>
</html>
