<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatSense AI-DVR | Enterprise Edge Node</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.8);
            --neon-green: #10b981;
            --neon-yellow: #eab308;
            --neon-red: #ef4444;
            --neon-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box; overflow: hidden;
        }

        /* HEADER & SEMANTIC SEARCH (Feature 4) */
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(6, 182, 212, 0.3); padding-bottom: 15px; margin-bottom: 20px;
        }
        
        .logo-block h1 { margin: 0; color: var(--neon-cyan); font-size: 1.5rem; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        .logo-block p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.8rem; }
        
        .semantic-search {
            display: flex; align-items: center; background: #000;
            border: 1px solid var(--text-muted); border-radius: 20px;
            padding: 5px 15px; width: 400px;
        }
        .semantic-search input {
            background: transparent; border: none; color: #fff; width: 100%;
            font-family: inherit; outline: none; padding: 8px;
        }
        .semantic-search button {
            background: var(--neon-cyan); border: none; color: #000;
            padding: 5px 15px; border-radius: 15px; font-weight: bold; cursor: pointer;
        }

        /* MAIN DASHBOARD GRID */
        .dashboard {
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px; flex: 1; min-height: 0;
        }

        /* LIVE CAMERA CONTAINER */
        .video-container {
            background: #000; border: 1px solid rgba(6, 182, 212, 0.4);
            border-radius: 8px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #webcam, #ai-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }
        #webcam { transform: scaleX(-1); /* Mirror webcam */ }
        #ai-canvas { z-index: 10; }

        .cam-label {
            position: absolute; top: 15px; left: 15px; z-index: 20;
            background: rgba(0,0,0,0.8); color: var(--neon-cyan);
            padding: 5px 10px; border-left: 3px solid var(--neon-cyan); font-size: 0.9rem;
        }

        /* ANALYTICS PANEL */
        .analytics { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .panel {
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 15px; display: flex; flex-direction: column;
        }
        .panel-title { color: var(--neon-cyan); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        /* THREAT SCORE METER */
        .score-display { display: flex; align-items: center; justify-content: space-between; }
        .score-circle {
            width: 80px; height: 80px; border-radius: 50%;
            border: 6px solid var(--neon-green); display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }
        .score-status { font-size: 1.2rem; font-weight: bold; color: var(--neon-green); }

        /* PREDICTIVE GRAPH (Feature 10) */
        .graph-container { width: 100%; height: 120px; background: #000; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        #threat-graph { width: 100%; height: 100%; }

        /* AI LOG */
        .timeline { list-style: none; padding: 0; margin: 0; font-size: 0.8rem; flex: 1; overflow-y: auto; }
        .timeline li { margin-bottom: 8px; color: var(--text-muted); }
        .timeline li.alert { color: var(--neon-red); font-weight: bold; }
        .timeline li.warn { color: var(--neon-yellow); }

    </style>
</head>
<body>

    <header>
        <div class="logo-block">
            <h1>ThreatSense AI-DVR</h1>
            <p id="system-status">System Initializing // Awaiting Edge AI Models...</p>
        </div>
        <div class="semantic-search">
            <input type="text" id="ai-prompt" placeholder="Ask AI: 'Show me anyone loitering near the safe yesterday...'">
            <button onclick="runMockSearch()">Search</button>
        </div>
    </header>

    <div class="dashboard">
        <div class="video-container" id="video-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="ai-canvas"></canvas>
            <div class="cam-label">CAM 01: SECURE VAULT ACCESS</div>
        </div>

        <div class="analytics">
            <div class="panel">
                <div class="panel-title">Real-Time Threat Analysis</div>
                <div class="score-display">
                    <div id="score-circle" class="score-circle">00</div>
                    <div id="score-status" class="score-status">NORMAL</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">LSTM Predictive Escalation</div>
                <div class="graph-container">
                    <canvas id="threat-graph"></canvas>
                </div>
                <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;">Solid: Real-time | Dotted: AI Prediction</p>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-title">System Action Log</div>
                <ul class="timeline" id="log-list">
                    <li>[SYSTEM] Node ready.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('ai-canvas');
        const ctx = canvas.getContext('2d');
        const scoreCircle = document.getElementById('score-circle');
        const scoreStatus = document.getElementById('score-status');
        const statusTxt = document.getElementById('system-status');
        const logList = document.getElementById('log-list');
        const graphCanvas = document.getElementById('threat-graph');
        const gCtx = graphCanvas.getContext('2d');

        let aiModel = null;
        let threatScore = 10;
        let scoreHistory = Array(30).fill(10); // Array to store history for the graph

        // Feature 8: Define the 3D Geofence (A restricted zone on the right side of the screen)
        // Since webcam is mirrored, we draw it on the logical left side of the canvas
        const geofence = { x: 50, y: 50, width: 250, height: 400 };

        function addLog(msg, type = "normal") {
            const li = document.createElement('li');
            li.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (type === "alert") li.className = "alert";
            if (type === "warn") li.className = "warn";
            logList.prepend(li);
        }

        // Mock Semantic Search Function
        function runMockSearch() {
            const input = document.getElementById('ai-prompt');
            if(!input.value) return;
            addLog(`LLM Query: "${input.value}"`, "normal");
            input.value = "Searching embeddings...";
            setTimeout(() => {
                input.value = "";
                addLog("LLM Result: Found 2 semantic matches. Retrieving video clips.", "warn");
            }, 1500);
        }

        // Initialize Camera
        navigator.mediaDevices.getUserMedia({ video: { width: 800, height: 600 } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    graphCanvas.width = graphCanvas.parentElement.clientWidth;
                    graphCanvas.height = graphCanvas.parentElement.clientHeight;
                    addLog("Camera stream established.");
                    loadAIModel();
                };
            }).catch(err => addLog("Camera Access Denied.", "alert"));

        // Load TensorFlow Model
        async function loadAIModel() {
            try {
                aiModel = await cocoSsd.load();
                statusTxt.innerText = "System Active // Edge AI Online // Monitoring Zone";
                statusTxt.style.color = "var(--neon-green)";
                addLog("COCO-SSD Filter Layer Online.");
                detectFrame();
                drawGraph(); // Start graph loop
            } catch (err) {
                addLog("Model failed to load.", "alert");
            }
        }

        // Main AI Loop
        async function detectFrame() {
            if (!aiModel) return;
            const predictions = await aiModel.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Geofence Zone
            ctx.fillStyle = "rgba(239, 68, 68, 0.15)";
            ctx.strokeStyle = "rgba(239, 68, 68, 0.8)";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.fillRect(geofence.x, geofence.y, geofence.width, geofence.height);
            ctx.strokeRect(geofence.x, geofence.y, geofence.width, geofence.height);
            ctx.setLineDash([]);
            ctx.fillStyle = "rgba(239, 68, 68, 0.8)";
            ctx.font = '14px Courier New';
            ctx.fillText("RESTRICTED VAULT ZONE", geofence.x + 10, geofence.y + 20);

            let humanInZone = false;
            let humanDetected = false;

            predictions.forEach(prediction => {
                if (prediction.class === 'person') {
                    humanDetected = true;
                    // Note: x coordinates are mirrored to match the CSS flipped video
                    let [x, y, width, height] = prediction.bbox;
                    let mirroredX = canvas.width - x - width;

                    // Check Intersection with Geofence
                    if (mirroredX < geofence.x + geofence.width &&
                        mirroredX + width > geofence.x &&
                        y < geofence.y + geofence.height &&
                        y + height > geofence.y) {
                        humanInZone = true;
                    }

                    // Draw Bounding Box
                    let boxColor = humanInZone ? '#ef4444' : '#10b981'; // Red if in zone, Green if safe
                    ctx.strokeStyle = boxColor;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(mirroredX, y, width, height);
                    
                    ctx.fillStyle = boxColor;
                    ctx.fillRect(mirroredX, y - 25, 180, 25);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 14px Courier New';
                    ctx.fillText(`ID:104 [${humanInZone ? 'BREACH' : 'TRACKING'}]`, mirroredX + 5, y - 8);
                }
            });

            // Update Threat Logic
            if (humanInZone) {
                threatScore = Math.min(threatScore + 5, 95); // Rapid escalation
                if(threatScore === 60) addLog("CRITICAL: Geofence breached. Predictive escalation triggered.", "alert");
            } else if (humanDetected) {
                threatScore = Math.max(threatScore - 1, 20); // Baseline human tracking
            } else {
                threatScore = Math.max(threatScore - 2, 10); // Decay to normal
            }

            updateUI();
            requestAnimationFrame(detectFrame);
        }

        function updateUI() {
            scoreCircle.innerText = threatScore;
            scoreHistory.push(threatScore);
            if(scoreHistory.length > 50) scoreHistory.shift(); // Keep last 50 data points

            if (threatScore > 65) {
                scoreCircle.style.borderColor = "var(--neon-red)";
                scoreCircle.style.color = "var(--neon-red)";
                scoreStatus.innerText = "RED ALERT";
                scoreStatus.style.color = "var(--neon-red)";
            } else if (threatScore > 30) {
                scoreCircle.style.borderColor = "var(--neon-yellow)";
                scoreCircle.style.color = "var(--neon-yellow)";
                scoreStatus.innerText = "INVESTIGATING";
                scoreStatus.style.color = "var(--neon-yellow)";
            } else {
                scoreCircle.style.borderColor = "var(--neon-green)";
                scoreCircle.style.color = "var(--neon-green)";
                scoreStatus.innerText = "NORMAL";
                scoreStatus.style.color = "var(--neon-green)";
            }
        }

        // Draw Predictive Graph
        function drawGraph() {
            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            
            // Draw grid lines
            gCtx.strokeStyle = "rgba(255,255,255,0.1)";
            gCtx.lineWidth = 1;
            for(let i=0; i<4; i++) {
                gCtx.beginPath();
                gCtx.moveTo(0, i * (graphCanvas.height/4));
                gCtx.lineTo(graphCanvas.width, i * (graphCanvas.height/4));
                gCtx.stroke();
            }

            // Draw historical line
            gCtx.beginPath();
            gCtx.strokeStyle = "var(--neon-cyan)";
            gCtx.lineWidth = 3;
            let stepX = graphCanvas.width / 60; // Space for 60 points
            
            for(let i=0; i<scoreHistory.length; i++) {
                let x = i * stepX;
                // Invert Y axis so 100 is top, 0 is bottom
                let y = graphCanvas.height - (scoreHistory[i] / 100 * graphCanvas.height); 
                if(i===0) gCtx.moveTo(x, y);
                else gCtx.lineTo(x, y);
            }
            gCtx.stroke();

            // Draw predictive line (Feature 10)
            if(scoreHistory.length > 0) {
                let lastX = (scoreHistory.length - 1) * stepX;
                let lastY = graphCanvas.height - (scoreHistory[scoreHistory.length-1] / 100 * graphCanvas.height);
                let trend = scoreHistory[scoreHistory.length-1] - scoreHistory[Math.max(0, scoreHistory.length-10)];
                
                gCtx.beginPath();
                gCtx.strokeStyle = "var(--neon-red)";
                gCtx.setLineDash([5, 5]);
                gCtx.moveTo(lastX, lastY);
                // Predict next 10 frames based on trend
                let predictedY = Math.max(0, Math.min(graphCanvas.height, lastY - (trend * 2)));
                gCtx.lineTo(lastX + (10 * stepX), predictedY);
                gCtx.stroke();
                gCtx.setLineDash([]);
            }

            setTimeout(drawGraph, 100); // Redraw graph 10x a second
        }
    </script>
</body>
</html>
