<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatSense OS | Dual-Core Demo</title>
    <link rel="icon" href="data:,">
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        :root {
            --bg-base: #020617;
            --panel-bg: rgba(15, 23, 42, 0.7);
            --cyan: #06b6d4;
            --green: #10b981;
            --red: #ef4444;
            --muted: #64748b;
            --text-main: #f8fafc;
        }

        body {
            margin: 0; padding: 20px; background: var(--bg-base); color: var(--text-main);
            font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box; overflow: hidden;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(6, 182, 212, 0.3); padding-bottom: 15px; margin-bottom: 20px;
        }

        .logo { font-size: 2.2rem; font-weight: 700; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--text-main); font-weight: 400; }
        
        .operator-tag { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: var(--cyan); background: rgba(6, 182, 212, 0.1); padding: 5px 15px; border: 1px solid var(--cyan); border-radius: 4px; }

        .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; flex: 1; min-height: 0; }

        /* CAMERA SECTION */
        .video-wrapper {
            position: relative; background: #000; border: 1px solid var(--cyan);
            border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        /* The Night Vision Effect for Home Mode */
        .night-vision #webcam {
            filter: grayscale(100%) contrast(120%) brightness(80%) sepia(40%) hue-rotate(80deg);
        }

        #webcam, #ai-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        #webcam { transform: scaleX(-1); }
        #ai-canvas { z-index: 10; }

        .cam-label {
            position: absolute; top: 20px; left: 20px; z-index: 20;
            font-family: 'Share Tech Mono', monospace; color: #fff; background: rgba(0,0,0,0.8);
            padding: 5px 10px; border-left: 3px solid var(--cyan);
        }

        /* CONTROL PANEL */
        .controls { display: flex; flex-direction: column; gap: 15px; }

        .btn-mode {
            background: rgba(15, 23, 42, 0.8); border: 1px solid var(--muted); color: var(--muted);
            padding: 15px; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 600;
            text-transform: uppercase; cursor: pointer; border-radius: 6px; transition: 0.3s;
            text-align: left; position: relative; overflow: hidden;
        }
        .btn-mode:hover { border-color: var(--cyan); color: var(--cyan); }
        .btn-mode.active { background: rgba(6, 182, 212, 0.1); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }

        .dashboard-card {
            background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; padding: 15px; flex: 1; display: flex; flex-direction: column;
        }

        .card-header { font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px; color: var(--cyan); }

        .status-display { text-align: center; margin: 10px 0; }
        .status-text { font-size: 2.5rem; font-weight: 700; color: var(--green); text-shadow: 0 0 10px var(--green); }
        
        .log-list { list-style: none; padding: 0; margin: 0; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; overflow-y: auto; flex: 1; }
        .log-list li { margin-bottom: 6px; color: var(--text-main); }
        .log-list li.warn { color: var(--red); font-weight: bold; }
        .log-list li.ignored { color: var(--muted); }

    </style>
</head>
<body>

    <header>
        <div class="logo">ThreatSense<span>.OS</span></div>
        <div class="operator-tag">OP: Y. SAOKHEDE // SYS: ONLINE</div>
    </header>

    <div class="layout">
        <div class="video-wrapper" id="video-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="ai-canvas"></canvas>
            <div id="cam-label" class="cam-label">CAM 01: INITIALIZING...</div>
        </div>

        <div class="controls">
            <button class="btn-mode" id="btn-home" onclick="setMode('HOME')">
                Mission 1: Residential Perimeter (Night)
                <div style="font-size: 0.8rem; color: var(--muted); margin-top: 5px; font-family: 'Share Tech Mono';">Filter: Non-Human | Trigger: Intruder</div>
            </button>

            <button class="btn-mode" id="btn-public" onclick="setMode('PUBLIC')">
                Mission 2: Public Space / Crowd
                <div style="font-size: 0.8rem; color: var(--muted); margin-top: 5px; font-family: 'Share Tech Mono';">Filter: Normal Movement | Trigger: Violence</div>
            </button>

            <div class="dashboard-card">
                <div class="card-header">System Status</div>
                <div class="status-display">
                    <div id="status-text" class="status-text">STANDBY</div>
                </div>
                <div class="card-header" style="margin-top: 20px;">Event Log</div>
                <ul class="log-list" id="log-list">
                    <li>System ready. Select a mission mode.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('ai-canvas');
        const ctx = canvas.getContext('2d');
        const videoWrapper = document.getElementById('video-wrapper');
        const camLabel = document.getElementById('cam-label');
        const statusText = document.getElementById('status-text');
        const logList = document.getElementById('log-list');
        
        let currentMode = 'NONE'; // 'HOME' or 'PUBLIC'
        let objectModel, poseModel;
        let isLooping = false;

        function addLog(msg, type = 'normal') {
            const li = document.createElement('li');
            li.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if(type) li.className = type;
            logList.prepend(li);
        }

        // Initialize WebCam
        navigator.mediaDevices.getUserMedia({ video: { width: 800, height: 600 } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    addLog("Optical stream connected.");
                    loadModels();
                };
            });

        // Load AI Models
        async function loadModels() {
            addLog("Loading Neural Networks...");
            objectModel = await cocoSsd.load(); // For Home Mode
            await tf.setBackend('webgl');
            poseModel = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }); // For Public Mode
            addLog("All Edge Models Ready. Select Mission.");
        }

        // Switch Modes
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-home').className = mode === 'HOME' ? 'btn-mode active' : 'btn-mode';
            document.getElementById('btn-public').className = mode === 'PUBLIC' ? 'btn-mode active' : 'btn-mode';
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            statusText.innerText = "SCANNING";
            statusText.style.color = "var(--cyan)";

            if (mode === 'HOME') {
                videoWrapper.classList.add('night-vision');
                camLabel.innerText = "CAM 01: PRIVATE RESIDENCE [NIGHT MODE]";
                camLabel.style.borderLeftColor = "var(--green)";
                addLog("Switched to Home Security. Object filtering active.");
            } else {
                videoWrapper.classList.remove('night-vision');
                camLabel.innerText = "CAM 02: METRO STATION [CROWD MONITOR]";
                camLabel.style.borderLeftColor = "var(--cyan)";
                addLog("Switched to Public Security. Biomechanical tracking active.");
            }

            if (!isLooping) {
                isLooping = true;
                processFrame();
            }
        }

        async function processFrame() {
            if (currentMode === 'NONE') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentMode === 'HOME') {
                await runHomeSecurity();
            } else if (currentMode === 'PUBLIC') {
                await runPublicSecurity();
            }

            if (isLooping) requestAnimationFrame(processFrame);
        }

        // ----------------------------------------------------
        // FEATURE 1: HOME SECURITY (Object Filtering)
        // ----------------------------------------------------
        async function runHomeSecurity() {
            if (!objectModel) return;
            const predictions = await objectModel.detect(video);
            
            let intruderDetected = false;

            predictions.forEach(p => {
                let [x, y, w, h] = p.bbox;
                let mirroredX = canvas.width - x - w; // Mirror for webcam

                if (p.class === 'person') {
                    intruderDetected = true;
                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 4;
                    ctx.strokeRect(mirroredX, y, w, h);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(mirroredX, y - 25, 200, 25);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Courier';
                    ctx.fillText("HUMAN INTRUDER", mirroredX + 5, y - 8);
                } else if (['dog', 'cat', 'bird', 'cell phone', 'book', 'cup'].includes(p.class)) {
                    // FILTERING FALSE POSITIVES
                    ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                    ctx.strokeRect(mirroredX, y, w, h); ctx.setLineDash([]);
                    ctx.fillStyle = '#64748b'; ctx.font = '14px Courier';
                    ctx.fillText(`FILTERED: ${p.class.toUpperCase()}`, mirroredX, y - 5);
                }
            });

            if (intruderDetected) {
                statusText.innerText = "HOME BREACH";
                statusText.style.color = "var(--red)";
                statusText.style.textShadow = "0 0 20px var(--red)";
                if(Math.random() > 0.95) addLog("CRITICAL: Unauthorized human detected in perimeter.", "warn");
            } else {
                statusText.innerText = "SECURE";
                statusText.style.color = "var(--green)";
                statusText.style.textShadow = "none";
            }
        }

        // ----------------------------------------------------
        // FEATURE 2: PUBLIC SECURITY (Violence Detection)
        // ----------------------------------------------------
        async function runPublicSecurity() {
            if (!poseModel) return;
            const poses = await poseModel.estimatePoses(video);
            
            let violenceDetected = false;

            if (poses.length > 0) {
                const pose = poses[0];
                const kp = pose.keypoints;

                // Draw Skeleton
                ctx.fillStyle = '#06b6d4';
                kp.forEach(point => {
                    if (point.score > 0.3) {
                        ctx.beginPath(); ctx.arc(canvas.width - point.x, point.y, 5, 0, 2 * Math.PI); ctx.fill();
                    }
                });

                // Violence Logic: Are hands raised in a boxing/fighting stance?
                let leftWrist = kp.find(k => k.name === 'left_wrist');
                let rightWrist = kp.find(k => k.name === 'right_wrist');
                let leftShoulder = kp.find(k => k.name === 'left_shoulder');
                let rightShoulder = kp.find(k => k.name === 'right_shoulder');

                if (leftWrist && rightWrist && leftShoulder && rightShoulder &&
                    leftWrist.score > 0.4 && rightWrist.score > 0.4) {
                    
                    // If wrists are held higher than the shoulders
                    if (leftWrist.y < leftShoulder.y && rightWrist.y < rightShoulder.y) {
                        violenceDetected = true;
                    }
                }

                // UI Update based on behavior
                if (violenceDetected) {
                    statusText.innerText = "VIOLENCE DETECTED";
                    statusText.style.color = "var(--red)";
                    statusText.style.textShadow = "0 0 20px var(--red)";
                    
                    // Draw Red warning overlay over the skeleton
                    let minX = Math.min(...kp.map(p => canvas.width - p.x));
                    let minY = Math.min(...kp.map(p => p.y));
                    ctx.fillStyle = "rgba(239, 68, 68, 0.2)";
                    ctx.fillRect(minX - 50, minY - 50, 200, 300);
                    
                    if(Math.random() > 0.90) addLog("ALERT: Aggressive fighting posture detected. Security dispatched.", "warn");
                } else {
                    statusText.innerText = "CROWD NORMAL";
                    statusText.style.color = "var(--cyan)";
                    statusText.style.textShadow = "none";
                }
            }
        }
    </script>
</body>
</html>
