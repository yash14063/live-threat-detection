version: '3.8'

services:
  threatsense:
    build: .
    container_name: threatsense-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/threats.db
      - LOG_LEVEL=INFO
      - USE_GPU=false
      - APP_ENV=production
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
      - ./storage:/app/storage
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - threatsense-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: threatsense-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - threatsense-net

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: threatsense-db
  #   environment:
  #     POSTGRES_USER: threatsense
  #     POSTGRES_PASSWORD: secure_password
  #     POSTGRES_DB: threatsense
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   networks:
  #     - threatsense-net

volumes:
  redis-data:
  # postgres-data:

networks:
  threatsense-net:
    driver: bridge
